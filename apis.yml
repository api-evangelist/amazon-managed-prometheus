aid: amazon-managed-prometheus
name: Amazon Managed Service for Prometheus
description: >-
  Amazon Managed Service for Prometheus is a serverless, Prometheus-compatible
  monitoring service for container metrics. It automatically scales as your
  monitoring needs increase, works with open-source tools, and integrates with
  Amazon EKS and other container environments. The service provides fully
  managed workspaces, alert manager definitions, and rule group namespaces
  for Prometheus-compatible monitoring at scale.
