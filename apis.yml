  - aid: amazon-managed-prometheus:amazon-managed-prometheus-api
    name: Amazon Managed Service for Prometheus API
    description: >-
      The Amazon Managed Service for Prometheus API provides programmatic
      access to create and manage workspaces, alert manager definitions, rule
      groups namespaces, logging configurations, and scrapers for
      Prometheus-compatible monitoring. Covers the full workspace lifecycle
      and monitoring configuration management.
